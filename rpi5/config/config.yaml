# =====================================================
# ProjectCortex v2.0 - Configuration File
# 3-Tier Hybrid Architecture with Supabase Integration
# =====================================================
# Author: Haziq (@IRSPlays)
# Date: January 8, 2026
# =====================================================

# =====================================================
# SUPABASE CONFIGURATION
# =====================================================
supabase:
  enabled: true  # Set to false to disable cloud sync entirely
  # Credentials loaded from environment variables (SUPABASE_URL, SUPABASE_ANON_KEY)
  # Set them in .env file or export in shell
  url: ""  # Overridden by SUPABASE_URL env var
  anon_key: ""  # Overridden by SUPABASE_ANON_KEY env var
  device_id: "rpi5-cortex-001"  # Unique device ID (change per device)

  # Sync Settings
  sync_interval_seconds: 60  # Batch upload every 60s
  batch_size: 100  # Max rows per batch upload
  enable_offline_queue: true  # Queue when WiFi disconnected

  # Local Cache Settings
  local_cache_size: 1000  # Keep last 1000 detections locally
  local_db_path: "local_cortex.db"  # Path to local SQLite database
  cleanup_old_rows: true  # Auto-cleanup old local rows

# =====================================================
# LAYER 0: THE GUARDIAN (Safety-Critical Detection)
# =====================================================
layer0:
  model_path: "models/converted/yolo26n_ncnn_model"  # YOLO v26n NCNN - user requested
  framework: "ncnn"  # NCNN - ARM-optimized for RPi5
  device: "cpu"  # Options: 'cpu' (RPi), 'cuda' (laptop with GPU)
  confidence: 0.5  # Detection confidence threshold
  enable_haptic: true  # Enable GPIO haptic feedback (RPi)
  gpio_pin: 18  # GPIO pin for vibration motor (BCM numbering)

  # Proximity thresholds for haptic feedback
  proximity_thresholds:
    immediate: 0.3  # >30% of frame = DANGER (continuous vibration)
    near: 0.15      # >15% of frame = WARNING (fast pulse)
    far: 0.05        # >5% of frame = NOTICE (slow pulse)

# =====================================================
# LAYER 1: THE LEARNER (Adaptive Context-Aware Detection)
# =====================================================
layer1:
  enabled: false # Disabled for now as per user request
  # YOLO v26s-seg NCNN - Adaptive detection for RPi5 performance
  # YOLO v26s-seg ONNX (Prompt Free) - More stable than NCNN OpenVocab
  model_path: "models/converted/yoloe_26n_seg_pf/model.onnx"
  # PyTorch fallback for full YOLOE features
  pt_model_path: "models/yolo26s.pt"

  device: "cpu"
  confidence: 0.25
  # Framework configuration
  framework:
    ncnn_enabled: false   # Disable NCNN for Layer 1
    onnx_enabled: true    # Enable ONNX
    pytorch_enabled: true  # Enable PyTorch fallback

  # Available Models
  models:
    ncnn: "models/converted/yolo26s_ncnn_model"
    onnx: "models/converted/yoloe_26n_seg_pf" # User requested specifically
    pt: "models/yolo26s.pt"

  mode: "TEXT_PROMPTS"  # Options: PROMPT_FREE, TEXT_PROMPTS, VISUAL_PROMPTS

  text_prompts:
    base_vocabulary:
      - "person"
      - "car"
      - "phone"
      - "wallet"
      - "keys"
      - "door"
      - "stairs"
      - "chair"
      - "table"
      - "bottle"
      - "cup"
      - "book"
      - "laptop"
      - "bag"
      - "glasses"
    max_classes: 100  # Maximum dynamic classes

  visual_prompts:
    reference_image_path: "visual_prompts/"  # Store reference images

# =====================================================
# LAYER 2: THE THINKER (Deep AI Reasoning)
# =====================================================
layer2:
  # Gemini API Configuration
  gemini_api_key: "YOUR_GEMINI_API_KEY"  # TODO: Add your API key
  model: "gemini-2.5-flash-native-audio-preview-12-2025"  # Model for Gemini Live API (native audio)

  # Live API (WebSocket)
  enable_live_api: true  # Use Gemini Live API (audio-to-audio)
  live_api_config:
    response_modalities: ["AUDIO", "TEXT"]  # Response types
    input_audio_transcription:
      enabled: true  # Transcribe input audio

  # Fallback Tiers
  tier_0:  # Gemini Live API (primary)
    enabled: true
    timeout_ms: 5000  # 5 second timeout

  tier_1:  # Gemini TTS (HTTP fallback)
    enabled: true
    api_keys:  # 6-key rotation
      - "YOUR_GEMINI_KEY_1"
      - "YOUR_GEMINI_KEY_2"
      - "YOUR_GEMINI_KEY_3"
      - "YOUR_GEMINI_KEY_4"
      - "YOUR_GEMINI_KEY_5"
      - "YOUR_GEMINI_KEY_6"

  tier_2:  # GLM-4.6V Z.ai (final fallback)
    enabled: true
    api_key: "YOUR_GLM_KEY"
    base_url: "https://open.bigmodel.cn/api/paas/v4/chat/completions"

  # Text-to-Speech
  tts:
    engine: "kokoro"  # Options: 'kokoro' (offline), 'gemini' (online)
    kokoro_model_path: "models/kokoro-v0_19.pth"
    sample_rate: 24000

# =====================================================
# LAYER 3: THE ROUTER (Intent Routing & Detection)
# =====================================================
layer3:
  # Intent Router Configuration
  intent_router:
    priority_keywords_enabled: true  # Enable priority keyword override
    fuzzy_matching_enabled: true     # Enable fuzzy matching
    fuzzy_threshold: 0.6             # Fuzzy match threshold (0-1)

  # Detection Router Configuration
  detection_router:
    aggregation_enabled: true   # Aggregate Layer 0 + Layer 1 detections
    deduplication_enabled: true  # Remove duplicate detections
    dedup_threshold: 0.5         # IoU threshold for deduplication (0-1)

  # Navigation Engine Configuration
  navigation:
    enabled: true
    google_maps_api_key: ""          # Set via GOOGLE_MAPS_API_KEY env var
    cache_db_path: "nav_cache.db"    # SQLite route cache
    arrival_threshold_m: 15          # Waypoint arrival radius (meters)
    destination_threshold_m: 20      # Final destination arrival radius
    turn_announce_distance_m: 25     # Announce turns this far ahead
    nav_loop_hz: 10                  # Navigation update frequency
    voice_cooldown_s: 5              # Minimum seconds between voice announcements

    # Saved Locations — used as origin when GPS is unavailable (indoor)
    # Set default: true on the location you're most often at.
    # Add aliases for natural speech matching ("grandma" → "Grandma's House")
    saved_locations:
      - name: "Home"
        address: "9 Canberra Drive, Singapore"
        aliases: ["my house", "my place", "house"]
        default: true
      - name: "Relative's House"
        address: "311 Canberra Road, Singapore"
        aliases: ["relative", "auntie", "uncle", "relative house"]
      - name: "School"
        address: ""   # TODO: fill in school address
        aliases: ["class", "campus"]

  # Bus Handler Configuration (LTA DataMall)
  bus:
    enabled: true
    lta_api_key: ""                  # Set via LTA_API_KEY env var
    bus_stops_db_path: "bus_stops.db" # SQLite bus stop database
    proximity_radius_m: 50           # Auto-activate bus mode within this radius
    arrival_refresh_s: 30            # Refresh bus arrivals every N seconds
    announce_interval_s: 60          # Re-announce arrivals every N seconds

# =====================================================
# CAMERA CONFIGURATION
# =====================================================
camera:
  device_id: 0  # Camera device ID (0 = /dev/video0)
  use_picamera: true  # True for RPi5 (Picamera2), False for laptop (OpenCV)
  resolution: [1920, 1080]  # Width, Height
  fps: 30  # Target FPS
  format: "RGBX"  # Pixel format (Picamera2)

  # Auto-exposure settings
  auto_exposure:
    enabled: true
    mode: "auto"  # Options: 'auto', 'manual'

# =====================================================
# AUDIO CONFIGURATION
# =====================================================
audio:
  # Input (Microphone)
  input_device:
    sample_rate: 16000  # Whisper STT sample rate
    channels: 1  # Mono

  # Output (Bluetooth Headphones)
  output_device:
    sample_rate: 24000  # Kokoro TTS sample rate
    channels: 1  # Mono
    latency_ms: 40  # Target latency

  # Voice Activity Detection (VAD)
  vad:
    enabled: true
    model: "silero"  # Options: 'silero' (offline), 'webrtc' (online)
    threshold: 0.65  # Speech probability threshold (0-1) — higher = reject more noise
    min_speech_duration_ms: 400  # Minimum speech length to accept (filters short noise bursts)
    min_silence_duration_ms: 500  # Silence gap before speech end (longer = more tolerant)
    padding_duration_ms: 200  # Audio padding around speech segments

  # Whisper STT
  whisper:
    model_size: "base"  # Options: 'tiny' (39M), 'base' (74M, recommended), 'small' (244M)

# =====================================================
# SPATIAL AUDIO CONFIGURATION
# =====================================================
spatial_audio:
  enabled: true
  engine: "pyopenal"  # Options: 'pyopenal' (3D), 'stereo' (2D)

  # Beacon Sounds
  beacon:
    enabled: true
    frequency: 440  # Hz (A4 note)
    duration: 0.3  # Seconds

  # Proximity Alerts
  proximity_alert:
    enabled: true
    immediate_distance: 0.5  # Meters (continuous sound)
    near_distance: 1.0        # Meters (fast pulse)
    far_distance: 1.5         # Meters (slow pulse)

# =====================================================
# GPS/IMU/BUTTON CONFIGURATION
# =====================================================
sensors:
  # GPS (NEO-6M / GT-U7) — UART serial
  # Wire: GPS TX → RPi5 GPIO15 (Pin 10), GPS RX → RPi5 GPIO14 (Pin 8)
  # Enable UART via raspi-config → Interface Options → Serial
  gps:
    enabled: true
    port: "/dev/ttyAMA0"   # Primary UART on RPi5
    baudrate: 9600          # NEO-6M / GT-U7 default baud rate
    timeout: 1.0            # Serial read timeout (seconds)
    phone_gps_enabled: true # Phone browser GPS as fallback
    phone_gps_port: 8766    # WebSocket port for phone GPS

  # IMU (BNO055) — I2C
  # Wire: SDA → GPIO2 (Pin 3), SCL → GPIO3 (Pin 5)
  # Enable I2C via raspi-config → Interface Options → I2C
  # Verify with: i2cdetect -y 1  (should show "28")
  imu:
    enabled: true
    i2c_address: 0x29       # 0x29 (ADDR pin high on your board) or 0x28 (ADDR pin low)
    poll_hz: 25             # Polling frequency (BNO055 supports up to 100Hz)

  # Physical Button — momentary push-button to GND
  # Wire: one leg to GPIO16 (Pin 36), other leg to GND (Pin 34)
  # Internal pull-up keeps pin HIGH at rest; press pulls it LOW
  button:
    enabled: true
    gpio_pin: 16            # BCM pin number
    auto_shutdown: true     # Very-long press (≥5s) triggers OS shutdown

# =====================================================
# DATA RECORDER CONFIGURATION
# =====================================================
data_recorder:
  enabled: true
  output_format: "euroc"  # Options: 'euroc', 'cortex'
  output_path: "recordings/"
  max_file_size_mb: 500  # Split recordings every 500MB

  # Sensors to record
  record_camera: true
  record_imu: true
  record_gps: true
  record_detections: true

# =====================================================
# LOGGING CONFIGURATION
# =====================================================
logging:
  level: "INFO"  # Options: 'DEBUG', 'INFO', 'WARNING', 'ERROR'
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # File logging
  file_logging:
    enabled: true
    path: "logs/cortex.log"
    max_size_mb: 100
    backup_count: 5  # Keep 5 backup logs

  # Supabase logging (upload ERROR logs)
  supabase_logging:
    enabled: true
    level: "ERROR"  # Only upload ERROR and above
    batch_size: 10  # Batch upload 10 logs at once

# =====================================================
# PERFORMANCE CONFIGURATION
# =====================================================
performance:
  # Thread pool size for parallel inference
  thread_pool_size: 2
  
  # Number of CPU threads for NCNN/ONNX (OMP_NUM_THREADS)
  # RPi5 has 4 cores — match physical core count to avoid over-subscription
  cpu_threads: 4

  # Frame queue size
  frame_queue_size: 2

  # Memory limits
  max_memory_mb: 3900  # Alert if memory usage > 3.9GB (RPi5 has 4GB)

  # CPU temperature limits
  max_cpu_temp_c: 80  # Alert if CPU temp > 80°C

# =====================================================
# DEVELOPMENT/DEBUGGING
# =====================================================
development:
  # Debug mode (verbose logging, save intermediate results)
  debug_mode: false

  # Save annotated frames (for debugging)
  save_annotated_frames: false
  annotated_frames_path: "debug/frames/"

  # Profiling (measure performance)
  profiling_enabled: false
  profiling_output: "debug/profiles/"

# =====================================================
# LAPTOP SERVER CONFIGURATION
# =====================================================
laptop_server:
  host: "10.201.86.101"  # Laptop IP address - UPDATE THIS for your network
  port: 8765

# =====================================================
# ZMQ VIDEO STREAMING CONFIGURATION
# =====================================================
zmq:
  video_port: 5555  # Port for ZMQ video streaming (RPi5 -> Laptop)
  topic_prefix: "cortex-video"  # Topic prefix for video frames
  high_water_mark: 1  # Only keep latest frame (low latency)

# =====================================================
# RPI5 DEVICE CONFIGURATION (for sync tools)
# =====================================================
rpi5_device:
  host: "10.201.86.31"  # RPi5 IP address - used by sync tools
  user: "cortex"  # SSH username for sync
  path: "/home/cortex/ProjectCortex"  # Remote path for sync

# =====================================================
# BLUETOOTH CONFIGURATION
# =====================================================
bluetooth:
  enabled: true  # Enable Bluetooth audio
  auto_connect: true  # Auto-connect to headphones on startup
  auto_reconnect: true  # Auto-reconnect if disconnected
  device_name: "CMF Buds"  # Target Bluetooth device name
  retry_count: 3  # Number of connection retries
  scan_duration: 15  # Seconds to scan for new devices

# =====================================================
# CARTESIA SONIC 3 TTS (Layer 2 Primary Voice Engine)
# =====================================================
cartesia:
  enabled: true
  model_id: "sonic-3"
  voice_id: "f786b574-daa5-4673-aa0c-cbe3e8534c02"  # Katie (stable, realistic)
  language: "en"
  sample_rate: 24000
  generation_config:
    speed: 1.0
    emotion: "calm"

# =====================================================
# CONVERSATION MEMORY & PERSONALIZATION
# =====================================================
conversation:
  enabled: true
  session_timeout_seconds: 1800    # 30 min runtime silence -> new session (startup always restores)
  max_turns: null                 # null = entire session (no limit)
  cleanup_days: 7                 # Delete conversations older than 7 days
  memory_images_dir: "memory_images"                   # Directory to store camera frames for recall
  context_compression_threshold_chars: 250000          # ~1MB, compress older turns above this

  # Agentic Vision (Gemini 3 Flash code execution)
  # Safety = Fast (no code exec), Reading/Describe = Agentic (code exec)
  agentic_vision:
    enabled: true
    # Query types that trigger code execution (zoom, crop, annotate)
    enabled_query_types:
      - "analysis_ocr"
      - "analysis_describe"

  # Response length limits (chars) by query type
  response_limits:
    detection_full: 150
    detection_count: 100
    analysis_ocr: 0              # No cap - read exactly what's there
    analysis_describe: 400
    analysis_safety: 300
    follow_up: 400               # When conversation has prior context
    default: 200

  # Personalization
  personalization:
    enabled: true
    extract_facts: true           # Auto-extract personal facts from conversation
    default_system_instruction: >
      You are Cortex, a personal AI assistant for a visually impaired user
      wearing smart glasses with a camera. Be specific about positions
      (left, right, ahead), distances, colors, text on signs, and hazards.
      Speak naturally and refer to past conversation when relevant.

# =====================================================
# HAILO NPU CONFIGURATION (Hailo-8L M.2 HAT)
# =====================================================
hailo:
  enabled: true  # Migrated to modern create_infer_model API
  device_id: null  # Auto-detect (null = first available device)

  # Depth Estimation (fast_depth model)
  depth:
    enabled: true
    model_path: "models/hailo/fast_depth.hef"
    input_size: [224, 224]
    scale_factor: 1.0  # Calibration factor: relative depth -> meters
    hazard_detection:
      wall_threshold: 1.5        # Distance (m) below which a surface is flagged as wall
      stair_gradient_threshold: 0.3  # Depth gradient magnitude for stair/curb detection
      dropoff_threshold: 3.0     # Depth ratio for drop-off detection
      approach_rate_threshold: 0.1   # Per-frame depth decrease rate for approaching objects
      alert_cooldown: 3.0        # Seconds between repeated alerts of the same type

  # OCR Recognition (PaddleOCR on Hailo)
  ocr:
    enabled: true
    recognition_model_path: "models/hailo/paddle_ocr_v3_recognition.hef"
    detection_method: "paddle"   # CPU-based PaddleOCR text detection
    confidence: 0.5              # Minimum OCR confidence threshold

# =====================================================
# SAFETY MONITOR CONFIGURATION (Fusion Engine)
# =====================================================
# Fuses YOLO detections + Hailo depth to alert on SILENT dangers only.
# Transparency-mode headphones mean the user already hears cars/people.
safety:
  tier2_max_distance: 2.0        # Metres — alert for silent static obstacles closer than this
  tier3_max_distance: 4.0        # Metres — alert for vehicles closer than this
  tier3_approach_velocity: 1.0   # m/s — vehicle must be closing at least this fast
  alert_cooldown: 3.0            # Seconds between repeated alerts of the same type
  tts_cooldown: 8.0              # Seconds between TTS voice announcements
  haptic_cooldown: 2.0           # Seconds between haptic pulses

# =====================================================
# HARDWARE SPECIFIC CONFIGURATIONS
# =====================================================
# Automatically detected at runtime, but can override here
hardware:
  # Raspberry Pi 5 specific
  rpi5:
    usb_max_current_enable: 1  # Enable USB-C PD power (1 = enabled)
    gpu_mem_mb: 256  # GPU memory split
    force_turbo: 0  # Force turbo mode (1 = enabled, 0 = auto)

# =====================================================
# END OF CONFIGURATION
# =====================================================
