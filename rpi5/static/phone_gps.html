<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cortex GPS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a; color: #e0e0e0;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; padding: 20px;
        }
        h1 { font-size: 1.4em; margin-bottom: 16px; color: #4fc3f7; }
        #status {
            font-size: 1.2em; padding: 16px 24px; border-radius: 12px;
            margin-bottom: 20px; text-align: center; width: 100%; max-width: 360px;
        }
        .ok   { background: #1b5e20; color: #a5d6a7; }
        .warn { background: #e65100; color: #ffcc80; }
        .err  { background: #b71c1c; color: #ef9a9a; }
        #info {
            font-size: 0.85em; color: #999; text-align: center;
            line-height: 1.6; max-width: 360px;
        }
        #info span { color: #bbb; font-family: monospace; }
        button {
            margin-top: 24px; padding: 14px 32px; font-size: 1.1em;
            border: none; border-radius: 8px; cursor: pointer;
            background: #1565c0; color: white; width: 100%; max-width: 360px;
        }
        button:active { background: #0d47a1; }
    </style>
</head>
<body>
    <h1>&#x1F9E0; Cortex GPS Link</h1>
    <div id="status" class="warn">Tap START to begin</div>
    <div id="info">
        <p>Lat: <span id="lat">—</span></p>
        <p>Lng: <span id="lng">—</span></p>
        <p>Accuracy: <span id="acc">—</span></p>
        <p>Speed: <span id="spd">—</span></p>
        <p>Sent: <span id="cnt">0</span> | Failed: <span id="fail">0</span></p>
    </div>
    <button id="btn" onclick="toggle()">START</button>

    <script>
        let watchId = null;
        let count = 0;
        let failCount = 0;
        let running = false;
        let gotFirstFix = false;
        let sendInProgress = false;

        const $status = document.getElementById('status');
        const $lat = document.getElementById('lat');
        const $lng = document.getElementById('lng');
        const $acc = document.getElementById('acc');
        const $spd = document.getElementById('spd');
        const $cnt = document.getElementById('cnt');
        const $fail = document.getElementById('fail');
        const $btn = document.getElementById('btn');

        const POST_URL = location.protocol + '//' + location.host + '/gps/update';

        function setStatus(msg, cls) {
            $status.textContent = msg;
            $status.className = cls;
        }

        function toggle() {
            if (running) { stop(); } else { start(); }
        }

        function start() {
            if (!navigator.geolocation) {
                setStatus('Geolocation not supported', 'err');
                return;
            }

            running = true;
            gotFirstFix = false;
            $btn.textContent = 'STOP';
            setStatus('Starting GPS...', 'warn');

            // Also do a one-shot getCurrentPosition for fastest first fix
            navigator.geolocation.getCurrentPosition(
                onPosition,
                function() {},  // ignore error for one-shot
                { enableHighAccuracy: true, maximumAge: 60000, timeout: 5000 }
            );

            // Start continuous watch
            startGeoWatch();
        }

        function startGeoWatch() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
            }
            watchId = navigator.geolocation.watchPosition(
                onPosition,
                onError,
                {
                    enableHighAccuracy: true,
                    maximumAge: 2000,
                    timeout: 10000
                }
            );
        }

        function stop() {
            running = false;
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            gotFirstFix = false;
            $btn.textContent = 'START';
            setStatus('Stopped', 'warn');
        }

        function onPosition(pos) {
            var c = pos.coords;
            var data = {
                lat: c.latitude,
                lng: c.longitude,
                alt: c.altitude,
                speed: c.speed,
                heading: c.heading,
                accuracy: c.accuracy
            };

            $lat.textContent = c.latitude.toFixed(6);
            $lng.textContent = c.longitude.toFixed(6);
            $acc.textContent = (c.accuracy || 0).toFixed(0) + 'm';
            $spd.textContent = c.speed ? (c.speed * 3.6).toFixed(1) + ' km/h' : '—';

            gotFirstFix = true;
            setStatus('Cortex GPS Active \u2705', 'ok');

            // Send via HTTP POST (fire-and-forget, non-blocking)
            sendGPS(data);
        }

        function sendGPS(data) {
            // Don't queue up requests if one is in flight
            if (sendInProgress) return;
            sendInProgress = true;

            fetch(POST_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(function(resp) {
                sendInProgress = false;
                if (resp.ok) {
                    count++;
                    $cnt.textContent = count;
                } else {
                    failCount++;
                    $fail.textContent = failCount;
                }
            })
            .catch(function() {
                sendInProgress = false;
                failCount++;
                $fail.textContent = failCount;
                if (failCount > 5 && count === 0) {
                    setStatus('Cannot reach Cortex — check connection', 'err');
                }
            });
        }

        function onError(err) {
            if (!running) return;
            if (err.code === 3) {
                // Timeout — retry with lower accuracy for faster fix
                if (!gotFirstFix) {
                    setStatus('Acquiring GPS signal...', 'warn');
                    // Try with relaxed settings for faster initial fix
                    navigator.geolocation.getCurrentPosition(
                        onPosition,
                        function() {},
                        { enableHighAccuracy: false, maximumAge: 60000, timeout: 5000 }
                    );
                }
                startGeoWatch();
            } else if (err.code === 1) {
                setStatus('Location permission denied', 'err');
                stop();
            } else {
                if (!gotFirstFix) {
                    setStatus('GPS unavailable — retrying...', 'warn');
                }
                setTimeout(function() {
                    if (running) startGeoWatch();
                }, 3000);
            }
        }

        document.addEventListener('visibilitychange', function() {
            if (!running) return;
            if (!document.hidden) {
                startGeoWatch();
            }
        });
    </script>
</body>
</html>
