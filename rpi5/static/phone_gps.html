<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cortex GPS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a; color: #e0e0e0;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; padding: 20px;
        }
        h1 { font-size: 1.4em; margin-bottom: 16px; color: #4fc3f7; }
        #status {
            font-size: 1.2em; padding: 16px 24px; border-radius: 12px;
            margin-bottom: 20px; text-align: center; width: 100%; max-width: 360px;
        }
        .ok   { background: #1b5e20; color: #a5d6a7; }
        .warn { background: #e65100; color: #ffcc80; }
        .err  { background: #b71c1c; color: #ef9a9a; }
        #info {
            font-size: 0.85em; color: #999; text-align: center;
            line-height: 1.6; max-width: 360px;
        }
        #info span { color: #bbb; font-family: monospace; }
        button {
            margin-top: 24px; padding: 14px 32px; font-size: 1.1em;
            border: none; border-radius: 8px; cursor: pointer;
            background: #1565c0; color: white; width: 100%; max-width: 360px;
        }
        button:active { background: #0d47a1; }
    </style>
</head>
<body>
    <h1>&#x1F9E0; Cortex GPS Link</h1>
    <div id="status" class="warn">Tap START to begin</div>
    <div id="info">
        <p>Lat: <span id="lat">—</span></p>
        <p>Lng: <span id="lng">—</span></p>
        <p>Accuracy: <span id="acc">—</span></p>
        <p>Speed: <span id="spd">—</span></p>
        <p>Updates: <span id="cnt">0</span></p>
    </div>
    <button id="btn" onclick="toggle()">START</button>

    <script>
        let ws = null;
        let watchId = null;
        let count = 0;
        let running = false;
        let gotFirstFix = false;
        let reconnectTimer = null;

        const $status = document.getElementById('status');
        const $lat = document.getElementById('lat');
        const $lng = document.getElementById('lng');
        const $acc = document.getElementById('acc');
        const $spd = document.getElementById('spd');
        const $cnt = document.getElementById('cnt');
        const $btn = document.getElementById('btn');

        function setStatus(msg, cls) {
            $status.textContent = msg;
            $status.className = cls;
        }

        function toggle() {
            if (running) { stop(); } else { start(); }
        }

        function connectWS() {
            if (ws && ws.readyState <= 1) return;
            const wsProt = location.protocol === 'https:' ? 'wss' : 'ws';
            const wsUrl = wsProt + '://' + location.hostname + ':' + location.port + '/ws';
            ws = new WebSocket(wsUrl);
            ws.onopen = function() {
                if (!gotFirstFix) {
                    setStatus('Connected — waiting for GPS...', 'warn');
                }
            };
            ws.onclose = function() {
                if (running) {
                    reconnectTimer = setTimeout(connectWS, 2000);
                }
            };
            ws.onerror = function() {};
        }

        function start() {
            if (!navigator.geolocation) {
                setStatus('Geolocation not supported', 'err');
                return;
            }

            running = true;
            gotFirstFix = false;
            $btn.textContent = 'STOP';
            setStatus('Starting GPS...', 'warn');

            connectWS();
            startGeoWatch();
        }

        function startGeoWatch() {
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
            }
            watchId = navigator.geolocation.watchPosition(
                onPosition,
                onError,
                {
                    enableHighAccuracy: true,
                    maximumAge: 10000,
                    timeout: 30000
                }
            );
        }

        function stop() {
            running = false;
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
            if (ws) {
                ws.close();
                ws = null;
            }
            gotFirstFix = false;
            $btn.textContent = 'START';
            setStatus('Stopped', 'warn');
        }

        function onPosition(pos) {
            const c = pos.coords;
            const data = {
                lat: c.latitude,
                lng: c.longitude,
                alt: c.altitude,
                speed: c.speed,
                heading: c.heading,
                accuracy: c.accuracy
            };

            $lat.textContent = c.latitude.toFixed(6);
            $lng.textContent = c.longitude.toFixed(6);
            $acc.textContent = (c.accuracy || 0).toFixed(0) + 'm';
            $spd.textContent = c.speed ? (c.speed * 3.6).toFixed(1) + ' km/h' : '—';
            count++;
            $cnt.textContent = count;

            gotFirstFix = true;
            setStatus('Cortex GPS Active \u2705', 'ok');

            if (!ws || ws.readyState > 1) { connectWS(); }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
            }
        }

        function onError(err) {
            if (!running) return;
            if (err.code === 3) {
                if (!gotFirstFix) {
                    setStatus('Acquiring GPS signal...', 'warn');
                }
                startGeoWatch();
            } else if (err.code === 1) {
                setStatus('Location permission denied', 'err');
                stop();
            } else {
                if (!gotFirstFix) {
                    setStatus('GPS unavailable — retrying...', 'warn');
                }
                setTimeout(function() {
                    if (running) startGeoWatch();
                }, 3000);
            }
        }

        document.addEventListener('visibilitychange', function() {
            if (!running) return;
            if (!document.hidden) {
                connectWS();
                startGeoWatch();
            }
        });
    </script>
</body>
</html>
